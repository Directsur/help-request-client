#
# Se ejecuta al publicar un release en GitHub.
# Compila los tres paquetes (Windows, Linux, macOS) y los adjunta al release.

name: Build & Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag del release al que adjuntar los binarios'
        required: true
        default: 'v1.1.1'

permissions:
  contents: write

jobs:

  # ── Windows → .exe ─────────────────────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compilar
        run: python build.py

      - name: Adjuntar al release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: dist/SolicitudAyuda.exe

  # ── Linux → AppImage ───────────────────────────────────────────────────────
  build-linux:
    name: Linux (AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk libfuse2

      - name: Instalar dependencias Python
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compilar AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          APP_VERSION: ${{ github.event.release.tag_name || inputs.tag }}
        run: bash build_linux.sh

      - name: Adjuntar al release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: SolicitudAyuda-x86_64.AppImage

  # ── macOS → .dmg ───────────────────────────────────────────────────────────
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compilar .dmg
        run: bash build_macos.sh

      - name: Adjuntar al release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: dist/SolicitudAyuda.dmg
